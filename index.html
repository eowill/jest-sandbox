<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E-commerce // Laboratório de Testes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e15;
  --bg-raised:#11161f;
  --bg-inset:#070a10;
  --line:#1f2733;
  --line-soft:#161d28;
  --text:#e6edf3;
  --text-dim:#7f8b9c;
  --text-faint:#4d5867;
  --green:#3ddc84;
  --green-dim:#1f4d36;
  --magenta:#ff3f8e;
  --magenta-dim:#4d1730;
  --amber:#ffb454;
  --amber-dim:#4d3a1a;
  --cyan:#4fd1ff;
  --cyan-dim:#173a4d;
  --mono:'JetBrains Mono', monospace;
  --disp:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 15% 0%, rgba(79,209,255,0.06), transparent 40%),
    radial-gradient(circle at 85% 100%, rgba(255,63,142,0.06), transparent 40%),
    var(--bg);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--green);color:#001a0e;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-inset);}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
.sidebar{
  background:var(--bg-raised);
  border-right:1px solid var(--line);
  padding:20px 0 20px 0;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{
  padding:0 20px 18px 20px;
  border-bottom:1px solid var(--line);
  margin-bottom:14px;
}
.brand .tag{font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;}
.brand h1{
  font-family:var(--disp);font-size:19px;margin:6px 0 2px;font-weight:700;
  letter-spacing:-0.02em;
}
.brand .sub{font-size:11px;color:var(--text-dim);}

.navgroup-label{
  font-size:10px;letter-spacing:1.5px;color:var(--text-faint);
  text-transform:uppercase;padding:0 20px;margin:14px 0 6px;
}
nav button.navitem{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  background:none;border:none;color:var(--text-dim);
  padding:9px 20px;font-size:13px;font-family:var(--mono);
  border-left:2px solid transparent;
  transition:background .12s, color .12s, border-color .12s;
}
nav button.navitem .num{color:var(--text-faint);font-size:11px;width:18px;flex-shrink:0;}
nav button.navitem:hover{background:var(--bg-inset);color:var(--text);}
nav button.navitem.active{
  color:var(--green);background:var(--bg-inset);
  border-left-color:var(--green);
}
nav button.navitem.active .num{color:var(--green);}

.sidebar-foot{padding:16px 20px 0;margin-top:16px;border-top:1px solid var(--line);}
.mini-stat{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin:6px 0;}
.mini-stat b{color:var(--cyan);}
.bar{height:4px;border-radius:2px;background:var(--bg-inset);overflow:hidden;margin-top:6px;}
.bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));}

main{padding:28px 36px 60px;max-width:1080px;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-bottom:26px;flex-wrap:wrap;
}
.crumbs{font-size:12px;color:var(--text-faint);}
.crumbs b{color:var(--text-dim);}
.toggles{display:flex;gap:8px;}
.toggle-btn{
  background:var(--bg-raised);border:1px solid var(--line);color:var(--text-dim);
  padding:7px 12px;border-radius:6px;font-size:11px;display:flex;align-items:center;gap:6px;
}
.toggle-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--text-faint);}
.toggle-btn.on{color:var(--amber);border-color:var(--amber-dim);background:var(--amber-dim);}
.toggle-btn.on .dot{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.toggle-btn.on.prof{color:var(--cyan);border-color:var(--cyan-dim);background:var(--cyan-dim);}
.toggle-btn.on.prof .dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}

h2.pagetitle{
  font-family:var(--disp);font-size:28px;margin:0 0 4px;letter-spacing:-0.02em;
}
p.pagesub{color:var(--text-dim);font-size:13.5px;margin:0 0 26px;max-width:640px;line-height:1.6;}

.panel{
  background:var(--bg-raised);border:1px solid var(--line);border-radius:10px;
  padding:20px;margin-bottom:20px;
}
.panel h3{
  font-family:var(--disp);font-size:14px;margin:0 0 14px;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.panel h3 .ico{color:var(--green);}

/* ---------- demo widgets ---------- */
.grid-products{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.pcard{
  background:var(--bg-inset);border:1px solid var(--line-soft);border-radius:8px;
  padding:14px;display:flex;flex-direction:column;gap:6px;
}
.pcard .cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);}
.pcard .nm{font-size:13.5px;font-weight:600;font-family:var(--disp);}
.pcard .pr{color:var(--green);font-size:14px;}
.pcard .st{font-size:11px;color:var(--text-faint);}
.pcard .actions{display:flex;gap:6px;margin-top:6px;}
.btn{
  border:1px solid var(--line);background:var(--bg-raised);color:var(--text);
  padding:6px 10px;border-radius:6px;font-size:11px;transition:.12s;
}
.btn:hover{border-color:var(--green);color:var(--green);}
.btn.primary{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.btn.primary:hover{background:var(--green);color:#001a0e;}
.btn.danger{border-color:var(--magenta-dim);color:var(--magenta);}
.btn.danger:hover{background:var(--magenta-dim);}
.btn.fav.active{color:var(--magenta);border-color:var(--magenta);}
.btn:disabled{opacity:.35;cursor:not-allowed;}

.cart-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:13px;
}
.cart-row:last-child{border-bottom:none;}
.cart-total{display:flex;justify-content:space-between;font-size:15px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.cart-total b{color:var(--green);}

.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;}
.field input{
  width:100%;background:var(--bg-inset);border:1px solid var(--line);border-radius:6px;
  padding:9px 10px;color:var(--text);font-family:var(--mono);font-size:13px;
}
.field input:focus{outline:none;border-color:var(--green);}
.msg{font-size:12px;padding:8px 10px;border-radius:6px;margin-top:10px;display:none;}
.msg.ok{display:block;background:var(--green-dim);color:var(--green);}
.msg.err{display:block;background:var(--magenta-dim);color:var(--magenta);}

table.simple{width:100%;border-collapse:collapse;font-size:12.5px;}
table.simple th{text-align:left;color:var(--text-faint);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--line);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;}
table.simple td{padding:8px;border-bottom:1px solid var(--line-soft);}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg-inset);border:1px solid var(--line);color:var(--text-dim);}
.badge.ok{color:var(--green);border-color:var(--green-dim);}
.badge.cancel{color:var(--magenta);border-color:var(--magenta-dim);}

/* ---------- lab function grid ---------- */
.fn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}
.fn-card{
  background:var(--bg-inset);border:1px solid var(--line-soft);border-radius:8px;
  padding:14px;text-align:left;color:var(--text);transition:.12s;position:relative;
}
.fn-card:hover{border-color:var(--green);transform:translateY(-1px);}
.fn-card .sig{font-size:12.5px;color:var(--cyan);display:block;margin-bottom:6px;}
.fn-card .obj{font-size:11.5px;color:var(--text-dim);line-height:1.5;}
.fn-card .done{
  position:absolute;top:10px;right:10px;font-size:9px;color:var(--green);
  border:1px solid var(--green-dim);background:var(--green-dim);padding:2px 6px;border-radius:8px;
  display:none;
}
.fn-card.done .done{display:inline-block;}

/* ---------- modal lab ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(4,6,10,0.78);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;z-index:50;
  padding:40px 20px;overflow-y:auto;
}
.overlay.show{display:flex;}
.modal{
  background:var(--bg-raised);border:1px solid var(--line);border-radius:12px;
  width:100%;max-width:760px;overflow:hidden;
}
.modal-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-bottom:1px solid var(--line);background:var(--bg-inset);
}
.modal-head .dots span{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;}
.modal-head .dots span:nth-child(1){background:var(--magenta);}
.modal-head .dots span:nth-child(2){background:var(--amber);}
.modal-head .dots span:nth-child(3){background:var(--green);}
.modal-head .title{font-size:12px;color:var(--text-dim);}
.modal-head .close{background:none;border:none;color:var(--text-faint);font-size:16px;}
.modal-head .close:hover{color:var(--magenta);}
.modal-body{padding:22px;}
.modal-body h4{
  font-family:var(--disp);font-size:13px;color:var(--text-faint);
  text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px;
}
.modal-body h4:first-child{margin-top:0;}
.modal-body .objetivo{font-size:13.5px;color:var(--text);line-height:1.6;font-style:italic;border-left:2px solid var(--green);padding-left:12px;}
pre.code{
  background:var(--bg-inset);border:1px solid var(--line-soft);border-radius:8px;
  padding:14px;font-size:12.5px;line-height:1.65;overflow-x:auto;color:#cdd9e5;
}
pre.code .kw{color:var(--magenta);}
ul.questions{margin:0;padding-left:18px;font-size:13px;color:var(--text-dim);line-height:1.9;}
.checklist{list-style:none;margin:0;padding:0;}
.checklist li{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-dim);padding:4px 0;}
.checklist input{accent-color:var(--green);width:14px;height:14px;}
.matchers{display:flex;flex-wrap:wrap;gap:6px;}
.matchers span{
  font-size:11px;background:var(--bg-inset);border:1px solid var(--line);
  padding:4px 9px;border-radius:5px;color:var(--cyan);
}
.markdone{margin-top:18px;}

/* ---------- console ---------- */
.console{
  background:var(--bg-inset);border:1px solid var(--line);border-radius:8px;overflow:hidden;
}
.console-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:#0d121b;border-bottom:1px solid var(--line);
}
.console-head .lbl{font-size:11px;color:var(--text-faint);letter-spacing:1px;}
.console-out{
  height:150px;overflow-y:auto;padding:10px 14px;font-size:12.5px;line-height:1.7;
}
.console-out .line{white-space:pre-wrap;word-break:break-word;}
.console-out .line.cmd{color:var(--text-dim);}
.console-out .line.cmd::before{content:"lab> ";color:var(--green);}
.console-out .line.res{color:var(--cyan);}
.console-out .line.error{color:var(--magenta);}
.console-input-row{display:flex;border-top:1px solid var(--line);}
.console-input-row span{padding:10px 0 10px 14px;color:var(--green);font-size:13px;}
.console-input-row input{
  flex:1;background:none;border:none;color:var(--text);font-family:var(--mono);
  padding:10px 14px 10px 6px;font-size:13px;
}
.console-input-row input:focus{outline:none;}

/* ---------- challenge mode hides ---------- */
body.challenge .hide-on-challenge{display:none !important;}
body.challenge .modal-head .title::after{content:" — modo desafio";color:var(--amber);}

/* ---------- professor panel ---------- */
.prof-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13px;}
.prof-row:last-child{border-bottom:none;}
.prof-row .nm{color:var(--text);}
.prof-bar{width:140px;height:6px;background:var(--bg-inset);border-radius:3px;overflow:hidden;}
.prof-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));}

.scenario-note{font-size:11px;color:var(--text-faint);margin-top:8px;}

footer.foot{margin-top:30px;color:var(--text-faint);font-size:11px;text-align:center;}

@media (max-width:860px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:relative;height:auto;}
  main{padding:20px;}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="tag">jest // sandbox</div>
      <h1>Mini E-commerce</h1>
      <div class="sub">Laboratório de Testes</div>
    </div>

    <div class="navgroup-label">Loja</div>
    <nav id="navMain"></nav>

    <div class="navgroup-label">Treino</div>
    <nav>
      <button class="navitem" data-page="lab"><span class="num">10</span> Laboratório de Testes</button>
    </nav>

    <div class="sidebar-foot">
      <div class="mini-stat"><span>Funções disponíveis</span><b id="statTotal">0</b></div>
      <div class="mini-stat"><span>Funções testadas</span><b id="statDone">0</b></div>
      <div class="bar"><span id="statBar" style="width:0%"></span></div>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="crumbs">mini-ecommerce / <b id="crumbCurrent">produtos</b></div>
      <div class="toggles">
        <button class="toggle-btn" id="btnChallenge"><span class="dot"></span> Modo Desafio</button>
        <button class="toggle-btn" id="btnProfessor"><span class="dot"></span> Modo Professor</button>
      </div>
    </div>

    <div id="content"></div>

    <footer class="foot">construído para praticar Jest — nenhuma resposta de teste é revelada aqui.</footer>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="title" id="modalTitle">função</div>
      <button class="close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
(function(){
"use strict";

/* ======================= ESTADO DA LOJA ======================= */

function gerarCenario(){
  const catalogos = [
    [
      {id:1,nome:"Mouse Gamer RGB",preco:129.9,estoque:14,categoria:"periféricos"},
      {id:2,nome:"Teclado Mecânico",preco:349.0,estoque:6,categoria:"periféricos"},
      {id:3,nome:"Monitor 27\" 144Hz",preco:1899.0,estoque:3,categoria:"monitores"},
      {id:4,nome:"Headset Wireless",preco:459.5,estoque:9,categoria:"áudio"},
      {id:5,nome:"Webcam Full HD",preco:219.0,estoque:0,categoria:"periféricos"},
      {id:6,nome:"Cadeira Gamer",preco:1299.9,estoque:4,categoria:"móveis"},
    ],
    [
      {id:1,nome:"Notebook 14\" i5",preco:3899.0,estoque:5,categoria:"computadores"},
      {id:2,nome:"HD Externo 1TB",preco:289.0,estoque:11,categoria:"armazenamento"},
      {id:3,nome:"SSD NVMe 500GB",preco:349.0,estoque:8,categoria:"armazenamento"},
      {id:4,nome:"Memória RAM 16GB",preco:259.0,estoque:0,categoria:"componentes"},
      {id:5,nome:"Placa de Vídeo 8GB",preco:2599.0,estoque:2,categoria:"componentes"},
      {id:6,nome:"Fonte 650W",preco:399.0,estoque:7,categoria:"componentes"},
    ]
  ];
  return catalogos[Math.floor(Math.random()*catalogos.length)].map(p=>({...p}));
}

const DB = {
  usuarios: [{usuario:"aluno", senha:"123456"}],
  produtos: gerarCenario(),
  pedidos: [],
  cupons: {
    "BEMVINDO10": {desconto:0.10, validade:"2027-12-31"},
    "FRETEGRATIS": {desconto:0.05, validade:"2027-12-31"},
    "EXPIRADO": {desconto:0.20, validade:"2024-01-01"},
  },
};

let carrinho = [];
let favoritos = [];
let perfil = {nome:"Aluno Teste", email:"aluno@exemplo.com", telefone:"61999990000"};

/* ======================= FUNÇÕES TESTÁVEIS ======================= */
/* Expostas em window para uso na Área de Experimentos do laboratório */

function fazerLogin(usuario, senha){
  return new Promise((resolve, reject)=>{
    if(!usuario || !senha) return reject(new Error("Usuário e senha são obrigatórios."));
    setTimeout(()=>{
      const achou = DB.usuarios.find(u=>u.usuario===usuario && u.senha===senha);
      if(achou) resolve({mensagem:"Login realizado.", usuario: achou.usuario});
      else reject(new Error("Erro de credenciais."));
    }, 250);
  });
}

function listarProdutos(){ return DB.produtos; }
function buscarProduto(id){ return DB.produtos.find(p=>p.id===id); }
function buscarPorCategoria(categoria){ return DB.produtos.filter(p=>p.categoria===categoria); }
function produtoExiste(id){ return DB.produtos.some(p=>p.id===id); }

function adicionarAoCarrinho(carrinhoAtual, produto){
  if(!produto || typeof produto.id === "undefined") throw new Error("Produto inválido.");
  return [...carrinhoAtual, produto];
}
function removerDoCarrinho(carrinhoAtual, id){ return carrinhoAtual.filter(p=>p.id!==id); }
function calcularTotal(carrinhoAtual){ return +carrinhoAtual.reduce((soma,p)=>soma+p.preco,0).toFixed(2); }
function limparCarrinho(){ return []; }

function adicionarFavorito(favsAtual, id){ return favsAtual.includes(id) ? favsAtual : [...favsAtual, id]; }
function removerFavorito(favsAtual, id){ return favsAtual.filter(f=>f!==id); }
function verificarFavorito(favsAtual, id){ return favsAtual.includes(id); }

function cupomValido(codigo){
  const c = DB.cupons[codigo];
  if(!c) return false;
  return new Date(c.validade) >= new Date();
}
function aplicarCupom(codigo, total){
  const c = DB.cupons[codigo];
  if(!c) throw new Error("Cupom inválido.");
  if(new Date(c.validade) < new Date()) throw new Error("Cupom expirado.");
  return +(total * (1 - c.desconto)).toFixed(2);
}

function verificarEstoque(id){
  const p = DB.produtos.find(p=>p.id===id);
  return p ? p.estoque : undefined;
}
function reduzirEstoque(id, quantidade){
  const p = DB.produtos.find(p=>p.id===id);
  if(!p) throw new Error("Produto não encontrado.");
  if(p.estoque < quantidade) throw new Error("Sem estoque suficiente.");
  p.estoque -= quantidade;
  return p.estoque;
}
function aumentarEstoque(id, quantidade){
  const p = DB.produtos.find(p=>p.id===id);
  if(!p) throw new Error("Produto não encontrado.");
  p.estoque += quantidade;
  return p.estoque;
}

function atualizarNome(perfilAtual, nome){
  if(!nome || nome.trim().length < 2) throw new Error("Nome inválido.");
  return {...perfilAtual, nome};
}
function atualizarEmail(perfilAtual, email){
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error("Email inválido.");
  return {...perfilAtual, email};
}
function atualizarTelefone(perfilAtual, telefone){
  const limpo = String(telefone).replace(/\D/g,"");
  if(limpo.length < 10 || limpo.length > 11) throw new Error("Telefone inválido.");
  return {...perfilAtual, telefone: limpo};
}

function criarPedido(carrinhoAtual){
  if(!carrinhoAtual.length) throw new Error("Carrinho vazio.");
  const pedido = {id: Date.now(), itens:[...carrinhoAtual], total: calcularTotal(carrinhoAtual), status:"pendente"};
  DB.pedidos.push(pedido);
  return pedido;
}
function cancelarPedido(id){
  const pedido = DB.pedidos.find(p=>p.id===id);
  if(!pedido) return undefined;
  pedido.status = "cancelado";
  return pedido;
}
function buscarPedido(id){ return DB.pedidos.find(p=>p.id===id); }

function calcularVendas(){
  return +DB.pedidos.filter(p=>p.status!=="cancelado").reduce((s,p)=>s+p.total,0).toFixed(2);
}
function produtoMaisVendido(){
  const contagem = {};
  DB.pedidos.filter(p=>p.status!=="cancelado").forEach(p=>{
    p.itens.forEach(item=>{ contagem[item.id] = (contagem[item.id]||0) + 1; });
  });
  let melhorId = null, melhorQtd = 0;
  for(const id in contagem){ if(contagem[id] > melhorQtd){ melhorQtd = contagem[id]; melhorId = +id; } }
  return melhorId ? buscarProduto(melhorId) : undefined;
}
function ticketMedio(){
  const validos = DB.pedidos.filter(p=>p.status!=="cancelado");
  if(!validos.length) return 0;

function professorPanelHTML(){
  const total = LAB.length;
  const done = Object.values(progresso).filter(Boolean).length;
  return `
  <div class="panel">
    <h3><span class="ico">▸</span> Modo Professor — progresso local desta máquina</h3>
    <p style="font-size:12px;color:var(--text-faint);margin-top:-6px;">
      Como este projeto roda inteiramente no navegador (sem backend), este painel reflete o progresso salvo localmente.
      Em uma turma real, esses dados viriam agregados de um servidor.
    </p>
    ${MODULOS.map(m=>{
      const fns = fnsDoModulo(m.id);
      const concl = fns.filter(f=>progresso[f.id]).length;
      const pct = fns.length ? Math.round((concl/fns.length)*100) : 0;
      return `<div class="prof-row">
        <span class="nm">${m.nome}</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="color:var(--text-faint);font-size:11px;">${concl}/${fns.length}</span>
          <span class="prof-bar"><span style="width:${pct}%"></span></span>
        </span>
      </div>`;
    }).join("")}
    <div class="prof-row" style="border-top:1px solid var(--line);margin-top:6px;padding-top:12px;">
      <span class="nm">Total geral</span>
      <span style="color:var(--cyan);">${done}/${total} (${Math.round((done/total)*100)}%)</span>
    </div>
  </div>`;
}

const PAGES = {
  produtos: pageProdutos, carrinho: pageCarrinho, login: pageLogin, perfil: pagePerfil,
  pedidos: pagePedidos, favoritos: pageFavoritos, cupons: pageCupons, estoque: pageEstoque,
  relatorios: pageRelatorios, lab: pageLab,
};

function render(){
  document.getElementById("content").innerHTML = PAGES[currentPage]();
  setActiveNav();
  atualizarStats();
  bindPageEvents();
}

/* ======================= EVENTOS DE PÁGINA ======================= */

function flashMsg(elId, ok, text){
  const el = document.getElementById(elId);
  if(!el) return;
  el.className = "msg " + (ok ? "ok":"err");
  el.textContent = text;
}

function bindPageEvents(){
  document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click", ()=>{
    const id = +b.dataset.add;
    const produto = buscarProduto(id);
    try{
      carrinho = adicionarAoCarrinho(carrinho, produto);
      render();
    }catch(e){ /* silencioso na demo */ }
  }));

  document.querySelectorAll("[data-fav]").forEach(b=>b.addEventListener("click", ()=>{
    const id = +b.dataset.fav;
    favoritos = verificarFavorito(favoritos, id) ? removerFavorito(favoritos, id) : adicionarFavorito(favoritos, id);
    render();
  }));

  const remBtns = document.querySelectorAll("[data-remove-id]");
  remBtns.forEach(b=>b.addEventListener("click", ()=>{
    carrinho = removerDoCarrinho(carrinho, +b.dataset.removeId);
    render();
  }));

  const limpar = document.getElementById("btnLimparCarrinho");
  if(limpar) limpar.addEventListener("click", ()=>{ carrinho = limparCarrinho(); render(); });

  const finalizar = document.getElementById("btnFinalizarPedido");
  if(finalizar) finalizar.addEventListener("click", ()=>{
    try{
      criarPedido(carrinho);
      carrinho = limparCarrinho();
      render();
      currentPage = "pedidos";
      render();
    }catch(e){ flashMsg("msgCarrinho", false, e.message); }
  });

  document.querySelectorAll("[data-cancel-pedido]").forEach(b=>b.addEventListener("click", ()=>{
    cancelarPedido(+b.dataset.cancelPedido);
    render();
  }));

  const btnLogin = document.getElementById("btnLogin");
  if(btnLogin) btnLogin.addEventListener("click", ()=>{
    const u = document.getElementById("loginUser").value;
    const p = document.getElementById("loginPass").value;
    fazerLogin(u,p).then(r=>flashMsg("msgLogin", true, r.mensagem))
                    .catch(e=>flashMsg("msgLogin", false, e.message));
  });

  const btnSalvarPerfil = document.getElementById("btnSalvarPerfil");
  if(btnSalvarPerfil) btnSalvarPerfil.addEventListener("click", ()=>{
    try{
      let novo = atualizarNome(perfil, document.getElementById("perfilNome").value);
      novo = atualizarEmail(novo, document.getElementById("perfilEmail").value);
      novo = atualizarTelefone(novo, document.getElementById("perfilTelefone").value);
      perfil = novo;
      flashMsg("msgPerfil", true, "Perfil atualizado.");
    }catch(e){ flashMsg("msgPerfil", false, e.message); }
  });

  const btnCupom = document.getElementById("btnAplicarCupom");
  if(btnCupom) btnCupom.addEventListener("click", ()=>{
    try{
      const novo = aplicarCupom(document.getElementById("cupomCodigo").value.trim().toUpperCase(), calcularTotal(carrinho));
      flashMsg("msgCupom", true, `Cupom aplicado! Novo total: R$ ${novo.toFixed(2)}`);
    }catch(e){ flashMsg("msgCupom", false, e.message); }
  });

  document.querySelectorAll("[data-estoque-down]").forEach(b=>b.addEventListener("click", ()=>{
    try{ reduzirEstoque(+b.dataset.estoqueDown, 1); render(); }catch(e){ /* sem estoque */ }
  }));
  document.querySelectorAll("[data-estoque-up]").forEach(b=>b.addEventListener("click", ()=>{
    aumentarEstoque(+b.dataset.estoqueUp, 1); render();
  }));

  document.querySelectorAll("[data-lab]").forEach(b=>b.addEventListener("click", ()=> openLab(b.dataset.lab)));
}

/* ======================= MODAL DE LABORATÓRIO ======================= */

const overlay = document.getElementById("overlay");
const modalBody = document.getElementById("modalBody");
const modalTitle = document.getElementById("modalTitle");

function openLab(fnId){
  const f = LAB.find(x=>x.id===fnId);
  if(!f) return;
  modalTitle.textContent = f.assinatura;

  modalBody.innerHTML = `
    <h4>Objetivo</h4>
    <p class="objetivo">${esc(f.objetivo)}</p>

    <h4 class="hide-on-challenge">Código da função</h4>
    <pre class="code hide-on-challenge">${f.codigo}</pre>

    <h4>O que observar</h4>
    <ul class="questions">${f.perguntas.map(q=>`<li>${esc(q)}</li>`).join("")}</ul>

    <h4>Planejamento</h4>
    <ul class="checklist">
      ${["Entendi a função","Descobri o retorno","Escolhi matcher","Executei Jest","Corrigi falhas"].map((c,i)=>`
        <li><input type="checkbox" id="chk_${f.id}_${i}"> <label for="chk_${f.id}_${i}">${c}</label></li>
      `).join("")}
    </ul>

    <h4>Matchers sugeridos <span style="color:var(--text-faint);font-weight:400;text-transform:none;letter-spacing:0;">(decida qual usar — nenhuma resposta é indicada)</span></h4>
    <div class="matchers">${["toBe","toEqual","toContain","toHaveLength","toBeTruthy","toBeFalsy","toThrow","rejects","resolves","toBeUndefined","toBeNull","toMatchObject"].map(m=>`<span>${m}</span>`).join("")}</div>

    <h4>Área de Experimentos</h4>
    <p style="font-size:12px;color:var(--text-dim);margin-top:-2px;">Chame a função manualmente antes de escrever o teste. Exemplo: <code style="color:var(--cyan)">${exemploChamada(f)}</code></p>
    <div class="console">
      <div class="console-head"><span class="lbl">CONSOLE</span><button class="btn" id="btnLimparConsole" style="padding:3px 8px;">limpar</button></div>
      <div class="console-out" id="consoleOut"></div>
      <div class="console-input-row">
        <span>›</span>
        <input id="consoleIn" placeholder="${esc(exemploChamada(f))}" autocomplete="off">
      </div>
    </div>

    <label class="markdone" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim);">
      <input type="checkbox" id="markDone" ${progresso[f.id] ? "checked":""}> marquei este teste como concluído
    </label>
  `;

  overlay.classList.add("show");

  const consoleOut = document.getElementById("consoleOut");
  const consoleIn = document.getElementById("consoleIn");

  function printLine(text, cls){
    const div = document.createElement("div");
    div.className = "line " + cls;
    div.textContent = text;
    consoleOut.appendChild(div);
    consoleOut.scrollTop = consoleOut.scrollHeight;
  }

  consoleIn.addEventListener("keydown", e=>{
    if(e.key !== "Enter") return;
    const cmd = consoleIn.value.trim();
    if(!cmd) return;
    printLine(cmd, "cmd");
    try{
      const resultado = eval(cmd);
      if(resultado instanceof Promise){
        resultado.then(r=>printLine("→ " + JSON.stringify(r), "res"))
                  .catch(err=>printLine("✕ " + err.message, "error"));
      } else {
        printLine("→ " + JSON.stringify(resultado), "res");
      }
    }catch(err){
      printLine("✕ " + err.message, "error");
    }
    consoleIn.value = "";
  });

  document.getElementById("btnLimparConsole").addEventListener("click", ()=>{ consoleOut.innerHTML=""; });

  document.getElementById("markDone").addEventListener("change", e=>{
    progresso[f.id] = e.target.checked;
    salvarProgresso(progresso);
    atualizarStats();
  });
}

function exemploChamada(f){
  const exemplos = {
    fazerLogin:`fazerLogin("aluno","123456")`,
    listarProdutos:`listarProdutos()`,
    buscarProduto:`buscarProduto(1)`,
    buscarPorCategoria:`buscarPorCategoria("periféricos")`,
    produtoExiste:`produtoExiste(1)`,
    adicionarAoCarrinho:`adicionarAoCarrinho(getCarrinho(), buscarProduto(1))`,
    removerDoCarrinho:`removerDoCarrinho(getCarrinho(), 1)`,
    calcularTotal:`calcularTotal(getCarrinho())`,
    limparCarrinho:`limparCarrinho()`,
    adicionarFavorito:`adicionarFavorito(getFavoritos(), 1)`,
    removerFavorito:`removerFavorito(getFavoritos(), 1)`,
    verificarFavorito:`verificarFavorito(getFavoritos(), 1)`,
    cupomValido:`cupomValido("BEMVINDO10")`,
    aplicarCupom:`aplicarCupom("BEMVINDO10", 100)`,
    verificarEstoque:`verificarEstoque(1)`,
    reduzirEstoque:`reduzirEstoque(1, 1)`,
    aumentarEstoque:`aumentarEstoque(1, 1)`,
    atualizarNome:`atualizarNome(getPerfil(), "Novo Nome")`,
    atualizarEmail:`atualizarEmail(getPerfil(), "novo@email.com")`,
    atualizarTelefone:`atualizarTelefone(getPerfil(), "61999998888")`,
    criarPedido:`criarPedido(getCarrinho())`,
    cancelarPedido:`cancelarPedido(123)`,
    buscarPedido:`buscarPedido(123)`,
    calcularVendas:`calcularVendas()`,
    produtoMaisVendido:`produtoMaisVendido()`,
    ticketMedio:`ticketMedio()`,
  };
  return exemplos[f.id] || `${f.id}()`;
}

document.getElementById("modalClose").addEventListener("click", closeLab);
overlay.addEventListener("click", e=>{ if(e.target===overlay) closeLab(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeLab(); });
function closeLab(){
  overlay.classList.remove("show");
  render(); // atualiza cards "testado" e stats
}

/* ======================= TOGGLES ======================= */

document.getElementById("btnChallenge").addEventListener("click", ()=>{
  challengeMode = !challengeMode;
  document.body.classList.toggle("challenge", challengeMode);
  document.getElementById("btnChallenge").classList.toggle("on", challengeMode);
});

document.getElementById("btnProfessor").addEventListener("click", ()=>{
  professorMode = !professorMode;
  document.getElementById("btnProfessor").classList.toggle("on", professorMode);
  document.getElementById("btnProfessor").classList.toggle("prof", professorMode);
  render();
});

document.addEventListener("click", e=>{

});

    favoritos = [];
    render();
  }

PAGES.produtos = function(){

    `<h2 class="pagetitle">Produtos</h2><div style="margin:-14px 0 18px;"><button class="btn" id="btnGerarCenario">↻ gerar novo cenário</button> <span class="scenario-note">embaralha o catálogo — bom para evitar testes "hardcoded"</span></div>`
  );
};

renderNav();
render();

})();
